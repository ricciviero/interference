  <!-- Mark (left) -->
  <g transform="translate(90,195) scale(2.4)">
    <defs>
      <clipPath id="og-clip"><circle cx="50" cy="50" r="48"/></clipPath>
    </defs>
    <g clip-path="url(#og-clip)" fill="none" stroke="#0a0a0a" stroke-width="0.9">
      <circle cx="34" cy="50" r="5.2"/><circle cx="34" cy="50" r="10.4"/>
      <circle cx="34" cy="50" r="15.6"/><circle cx="34" cy="50" r="20.8"/>
      <circle cx="34" cy="50" r="26"/><circle cx="34" cy="50" r="31.2"/>
      <circle cx="34" cy="50" r="36.4"/><circle cx="34" cy="50" r="41.6"/>
      <circle cx="34" cy="50" r="46.8"/>
      <circle cx="66" cy="50" r="5.2"/><circle cx="66" cy="50" r="10.4"/>
      <circle cx="66" cy="50" r="15.6"/><circle cx="66" cy="50" r="20.8"/>
      <circle cx="66" cy="50" r="26"/><circle cx="66" cy="50" r="31.2"/>
      <circle cx="66" cy="50" r="36.4"/><circle cx="66" cy="50" r="41.6"/>
