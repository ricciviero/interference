<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="240" height="240" role="img" aria-label="Interference logomark (animated)">
  <title>Interference</title>
  <defs>
    <clipPath id="pm-clip-anim"><circle cx="50" cy="50" r="48"/></clipPath>
  </defs>

  <g clip-path="url(#pm-clip-anim)" fill="none" stroke="currentColor" stroke-width="1">
    <!-- Left source: 6 expanding waves, 3s period, 0.5s stagger -->
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Right source: same parameters, same phase (coherent sources) -->
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="50" r="0">
      <animate attributeName="r" from="0" to="52" dur="3s" begin="-2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.95" to="0" dur="3s" begin="-2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Emitters: subtle pulse synchronised with wave release -->
  <circle cx="34" cy="50" r="2.4" fill="currentColor">
    <animate attributeName="r" values="2.4;3;2.4" keyTimes="0;0.05;0.5" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="66" cy="50" r="2.4" fill="currentColor">
    <animate attributeName="r" values="2.4;3;2.4" keyTimes="0;0.05;0.5" dur="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Instrument plate: static enclosing ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
