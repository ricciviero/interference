name: release-check

# Valida il pacchetto quando si pusha un tag vX.Y.Z.
# Il publish su npm rimane un'operazione manuale del maintainer.

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test ./src

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate npm package
        run: npm publish --dry-run --json
