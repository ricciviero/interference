name: publish

# Pubblica su npm automaticamente quando si pusha un tag vX.Y.Z.
# Flusso manutentore: `npm version minor && git push --follow-tags`
#   → preversion (typecheck+test) → bump+tag → postversion (push) → questa Action pubblica.
# Richiede il secret repo NPM_TOKEN (automation token npm).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # per npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test ./src

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
