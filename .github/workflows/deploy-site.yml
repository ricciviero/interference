name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash -lc '~/deploy-interference.sh'"

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>✅ Deploy interference</b>%0A%0A🌿 <code>${{ github.ref_name }}</code>%0A🔗 <a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>Vedi commit</a>"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>❌ Deploy interference fallito</b>%0A%0A🌿 <code>${{ github.ref_name }}</code>%0A🔗 <a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>Vedi commit</a>"
